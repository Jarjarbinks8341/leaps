name: Daily QQQ LEAPS Signal

on:
  schedule:
    - cron: '0 15 * * 1-5' # 15:00 UTC Mon-Fri — 11:00 AM ET in DST / 10:00 AM ET in standard time. The script itself gates on NYSE holidays, so this just prunes obvious weekends.
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.11'

      - run: uv run qqq_leaps.py

      - name: Commit report + IV history
        run: |
          git config --global user.name 'LEAPS-Bot'
          git config --global user.email 'leaps-bot@users.noreply.github.com'
          git add DAILY_REPORT.md stock_prices.db
          git diff --cached --quiet || git commit -m "Daily QQQ LEAPS signal: $(date -u +'%Y-%m-%d')"
          git push
